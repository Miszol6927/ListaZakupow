<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Lista Zakupów</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

<script src="script.js"></script>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-4 p-md-5">
                        
                        <h2 class="text-center mb-4 fw-bold text-primary">
                            <i class="fa-solid fa-cart-shopping me-2"></i>Moja Lista Zakupów
                        </h2>

                        <div class="input-group mb-3 shadow-sm rounded">
                            <input type="text" id="item-input" class="form-control form-control-lg border-0 bg-light" placeholder="Co kupujemy?">
                            <button id="btn-add" class="btn btn-primary px-4"><i class="fa-solid fa-plus"></i> Dodaj</button>
                        </div>
                        
                        <div class="d-flex justify-content-center gap-2 mb-4">
                            <button id="btn-prepend" class="btn btn-outline-primary btn-sm"><i class="fa-solid fa-arrow-up"></i> Na początek</button>
                            <button id="btn-append" class="btn btn-outline-primary btn-sm"><i class="fa-solid fa-arrow-down"></i> Na koniec</button>
                        </div>

                        <div class="row g-2 mb-4 bg-light p-3 rounded-3">
                            <div class="col-md-6">
                                <div class="input-group input-group-sm">
                                    <span class="input-group-text border-0"><i class="fa-solid fa-magnifying-glass"></i></span>
                                    <input type="text" id="filter-input" class="form-control border-0" placeholder="Filtruj listę...">
                                </div>
                            </div>
                            <div class="col-md-6 d-flex gap-2">
                                <button id="btn-sort" class="btn btn-sm btn-secondary w-100"><i class="fa-solid fa-arrow-down-a-z"></i> Sortuj</button>
                                <button id="btn-color-even" class="btn btn-sm btn-dark w-100"><i class="fa-solid fa-palette"></i> Kolory</button>
                            </div>
                        </div>

                        <ul id="shopping-list" class="list-group mb-4 shadow-sm">
                            </ul>

                        <hr class="text-muted">
                        <div class="d-flex flex-wrap justify-content-between gap-2 mt-3">
                            <button id="btn-remove-last" class="btn btn-warning text-dark fw-medium"><i class="fa-solid fa-eraser"></i> Usuń ostatni</button>
                            <div>
                                <button id="btn-restore" class="btn btn-success"><i class="fa-solid fa-rotate-left"></i> Przywróć</button>
                                <button id="btn-clear" class="btn btn-danger"><i class="fa-solid fa-trash-can"></i> Wyczyść</button>
                            </div>
                        </div>

                    </div>
                </div>
                
            </div>
        </div>
    </div>

    <script
